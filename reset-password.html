<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña - Abarrotes El Rosal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      max-width: 420px;
      width: 100%;
      padding: 36px;
      text-align: center;
    }

    .card img.logo {
      max-width: 200px;
      width: 100%;
      margin-bottom: 24px;
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 24px;
    }

    .field {
      text-align: left;
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
      outline: none;
      transition: border-color 0.18s;
    }

    .field input:focus {
      border-color: #ec1d25;
    }

    .btn {
      display: block;
      width: 100%;
      background: #ec1d25;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: Arial, sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.18s;
    }

    .btn:hover { background: #c9181d; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }

    .msg.success {
      background: #f0fff4;
      border: 1px solid #a3e8b5;
      color: #166534;
    }

    .msg.error {
      background: #fff0f0;
      border: 1px solid #ffc0c0;
      color: #c00;
    }
  </style>
</head>
<body>

  <div class="card">
    <img class="logo" src="img/logo.png" alt="Abarrotes El Rosal">
    <h1>Nueva contraseña</h1>

    <div class="field">
      <label for="new-pass">Nueva contraseña</label>
      <input type="password" id="new-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>

    <div class="field">
      <label for="confirm-pass">Confirmar contraseña</label>
      <input type="password" id="confirm-pass" placeholder="Repite tu contraseña" autocomplete="new-password">
    </div>

    <button class="btn" id="save-btn" onclick="savePassword()">Guardar</button>

    <div class="msg" id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    // Supabase detecta el token automáticamente en la URL
    window.supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Token válido — formulario ya visible, no hacer nada extra
        console.log('Sesión de recuperación detectada');
      }
    });

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    async function savePassword() {
      const pass  = document.getElementById('new-pass').value;
      const pass2 = document.getElementById('confirm-pass').value;
      const btn   = document.getElementById('save-btn');

      document.getElementById('msg').style.display = 'none';

      if (!pass || !pass2) {
        showMsg('Por favor completa ambos campos.', 'error');
        return;
      }

      if (pass !== pass2) {
        showMsg('Las contraseñas no coinciden.', 'error');
        return;
      }

      if (pass.length < 6) {
        showMsg('La contraseña debe tener al menos 6 caracteres.', 'error');
        return;
      }

      btn.textContent = 'Guardando...';
      btn.disabled = true;

      const { error } = await window.supabaseClient.auth.updateUser({ password: pass });

      btn.textContent = 'Guardar';
      btn.disabled = false;

      if (error) {
        showMsg(error.message || 'Error al actualizar la contraseña.', 'error');
      } else {
        showMsg('✅ Contraseña actualizada. Redirigiendo...', 'success');
        btn.style.display = 'none';
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
      }
    }

    // Permitir Enter en los campos
    ['new-pass', 'confirm-pass'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') savePassword();
      });
    });
  </script>
</body>
</html>
